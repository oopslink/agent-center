# pnpm 10 honors `onlyBuiltDependencies` from pnpm-workspace.yaml as
# the explicit allow-list of packages whose lifecycle scripts may
# run during install. Mirrors the same list in web/package.json's
# `pnpm` block for older pnpm versions; pnpm 10+ prefers this file.
#
# esbuild + msw both ship native binaries / service-worker fetches
# that legitimately need their postinstall scripts to land usable
# artifacts. Without this allow-list pnpm 10 warns
# `[ERR_PNPM_IGNORED_BUILDS]` on every install and skips them,
# producing a non-fatal but noisy first-clone experience.
onlyBuiltDependencies:
  - esbuild
  - msw
