# pnpm 10 prompts on install when a transitive dep ships lifecycle
# scripts that aren't explicitly approved. The two formats it
# understands in this file (pnpm 10.31.0 verified):
#
#   onlyBuiltDependencies:    # legacy list form
#     - <pkg>
#
#   allowBuilds:              # current map form (per-pkg boolean)
#     <pkg>: true|false
#
# We declare BOTH so pnpm 10.31+ takes the `allowBuilds:` map (which
# is what its auto-stub injects) and older pnpm 10 / pnpm 9 fall
# back to `onlyBuiltDependencies`.
#
# esbuild + msw both have legitimate postinstall scripts: esbuild
# installs the platform-specific native binary; msw drops its
# service-worker stub. Without explicit `true` here pnpm prints
# `[ERR_PNPM_IGNORED_BUILDS]` and skips them, leaving a noisy /
# (in stricter pnpm versions) failing install.

allowBuilds:
  esbuild: true
  msw: true

onlyBuiltDependencies:
  - esbuild
  - msw
