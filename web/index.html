<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-center</title>
    <!--
      Fonts: the body/heading stacks now use Tailwind's DEFAULT system
      stack (@oopslink locked — dropped the custom DM Sans + Space Grotesk
      pairing), so no web font is downloaded for them. Only JetBrains Mono
      (used by `font-mono` for IDs / timestamps / code) is still loaded.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-bg-base text-text-primary font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
