<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路线图 · agent-center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/redesign.css">
<style>
.rhero { padding: 50px 0 16px; }
.rhero h1 { font-size: 40px; font-weight: 800; letter-spacing: -.03em; }
.rhero p { color: var(--ink-2); font-size: 17px; max-width: 580px; margin: 12px 0 0; }

/* compact status legend (secondary axis) */
.statusbar { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-md); padding: 11px 16px; margin: 20px 0 30px; }
.statusbar .lab { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); }
.statusbar .s { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-2); }
.statusbar .s b { color: var(--ink); font-weight: 600; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.d-done{background:var(--success)} .d-prog{background:var(--accent)} .d-defer{background:var(--warning)} .d-vis{background:var(--generic)}

/* PRIMARY: 专题 epics as swimlanes */
.epics { display: grid; gap: 16px; }
.epic { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 20px 22px; position: relative; overflow: hidden; }
.epic::before { content:""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--ec); }
.epic .eh { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.epic .ic { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; font-size: 22px; background: var(--ec-bg); color: var(--ec); flex: none; }
.epic .et h3 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
.epic .et p { margin: 3px 0 0; font-size: 13px; color: var(--ink-2); }
.epic .prog { margin-left: auto; text-align: right; flex: none; }
.epic .prog .bar { width: 130px; height: 7px; border-radius: 999px; background: var(--bg-subtle); overflow: hidden; }
.epic .prog .bar i { display: block; height: 100%; background: var(--ec); border-radius: 999px; }
.epic .prog .pct { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); margin-top: 4px; }

.feats { display: grid; grid-template-columns: repeat(auto-fill,minmax(212px,1fr)); gap: 11px; }
.feat { border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 13px; background: var(--bg-base); transition: .18s; }
.feat:hover { border-color: var(--ec); box-shadow: var(--shadow-1); }
.feat .ft { font-weight: 600; font-size: 13.5px; line-height: 1.3; }
.feat p { margin: 5px 0 9px; font-size: 11.5px; color: var(--ink-2); line-height: 1.45; }
.feat .meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.feat .st { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; }
.st-done{ color: var(--success); background: var(--status-green-bg,#dcfce7); } .st-prog{ color: var(--accent); background: var(--core-bg); }
.st-defer{ color: var(--warning); background: var(--status-amber-bg,#fef3c7); } .st-vis{ color: var(--generic); background: var(--generic-bg); }
.feat .ver { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }

/* epic accent palettes */
.e-cloud { --ec: var(--accent); --ec-bg: var(--core-bg); }
.e-agent { --ec: var(--essential); --ec-bg: var(--essential-bg); }
.e-collab{ --ec: var(--status-cyan-solid,#0e7490); --ec-bg: var(--status-cyan-bg,#cffafe); }
.e-ui    { --ec: var(--generic); --ec-bg: var(--generic-bg); }
.e-orch  { --ec: var(--brand); --ec-bg: var(--core-bg); }
.e-plat  { --ec: #475569; --ec-bg: var(--bg-subtle); }

footer { border-top: 1px solid var(--border); padding: 30px 0; margin-top: 50px; color: var(--ink-3); font-size: 13px; }
.fade { opacity:0; transform: translateY(12px); animation: rise .55s ease forwards; }
@keyframes rise { to { opacity:1; transform:none; } }
@media (max-width: 760px){ .rhero h1{font-size:30px} .epic .prog{display:none} }
</style>
</head>
<body>
<header class="nav">
  <div class="in"><span class="brand"><span class="glyph"></span>agent-center</span>
    <nav><a href="../index.html">首页</a><a href="../product/index.html">产品</a><a href="../dev/v2.15.0/index.html">架构</a><a href="../manual/v2.15.0/index.html">手册</a><a class="active" href="../roadmap/index.html">路线图</a><a href="https://github.com/oopslink/agent-center">GitHub ↗</a></nav>
  </div>
</header>

<section class="rhero">
  <div class="wrap">
    <span class="eyebrow">ROADMAP · 按专题归类</span>
    <h1>路线图</h1>
    <p>特性按<strong>专题</strong>归类 —— 每个专题是一条长期主线，里面的特性标注各自状态。不是承诺时间表，是取舍记录。</p>
  </div>
</section>

<div class="wrap">
  <div class="statusbar fade">
    <span class="lab">状态说明</span>
    <span class="s"><span class="dot d-done"></span><b>已完成</b> 已发布可用</span>
    <span class="s"><span class="dot d-prog"></span><b>进行中</b> 当前周期开发</span>
    <span class="s"><span class="dot d-defer"></span><b>推迟</b> 主动排后</span>
    <span class="s"><span class="dot d-vis"></span><b>愿景</b> 远期方向</span>
  </div>

  <div class="epics" id="epics"></div>
</div>

<footer><div class="wrap" style="display:flex;justify-content:space-between"><span>© 2026 agent-center · oopslink</span><span style="font-family:var(--font-mono)">v2.15.0 · 路线图按专题更新</span></div></footer>

<script>
const ST = { done:["已完成","st-done"], prog:["进行中","st-prog"], defer:["推迟","st-defer"], vis:["愿景","st-vis"] };
const EPICS = [
  { cls:"e-cloud", ic:"☁", name:"上云与部署形态", desc:"从 loopback 单机走向远程协作与云端运行。",
    feats:[
      {t:"单机 / 多机部署", d:"TCP + TLS 指纹固定，worker 跨机注册。", s:"done", v:"v2.7+"},
      {t:"上云运行形态", d:"Center 托管云端、worker 回连的部署模型。", s:"vis", v:"vision"},
      {t:"远程协作鉴权", d:"突破 loopback-only，安全的远程多人接入。", s:"vis", v:"vision"},
    ]},
  { cls:"e-agent", ic:"◑", name:"Agent 强化", desc:"让数字员工更自主、更可控、更可信。",
    feats:[
      {t:"Agent 一等身份", d:"命名 + 状态机 + 并发记账（AgentInstance）。", s:"done", v:"v2.7+"},
      {t:"开放认领 claimability", d:"成员 agent 自主认领 Assignment Pool 任务。", s:"done", v:"v2.10.1"},
      {t:"Supervisor 更强自主", d:"更少升级到人、更聪明的调度决策。", s:"vis", v:"vision"},
      {t:"Agent issue 管理工具", d:"给 agent 补 create/close/comment issue 全能力。", s:"done", v:"v2.10.3"},
      {t:"Agent 提醒 / 定时", d:"给同 project agent 设一次性 / cron 提醒，到点作为 directed message 唤醒。", s:"done", v:"v2.11.0"},
      {t:"Agent@Agent 唤醒护栏", d:"agent→agent 唤醒四闸熔断（深度/环/频控/成本），human 必达；阈值 Settings 可配。", s:"done", v:"v2.12.0"},
      {t:"LLM 限速自动恢复", d:"server-side rate-limit 自动退避重试。", s:"done", v:"v2.14.0"},
    ]},
  { cls:"e-collab", ic:"≋", name:"协作与会话", desc:"人和 agent 在同一条可追溯线程上协作。",
    feats:[
      {t:"消息线程 Thread", d:"频道 / DM / 任务讨论的线程化消息。", s:"done", v:"v2.9.x"},
      {t:"附件 + linkify", d:"图片/文件收发、实体引用自动链接。", s:"done", v:"v2.9.2"},
      {t:"全会话附件统一", d:"Plan chat / 频道 / DM / 任务讨论都能收发附件。", s:"done", v:"v2.10.3"},
      {t:"回复护栏 ReplyGuardrail", d:"directed 回复漏发自动 re-inject + 兜底提醒。", s:"done", v:"v2.14.0"},
    ]},
  { cls:"e-ui", ic:"▦", name:"界面体验 (UI / UX)", desc:"桌面、移动、文档站的一致专业体验。",
    feats:[
      {t:"三栏式桌面 Shell", d:"模块栏 / 列表 / 详情 / 上下文四区。", s:"done", v:"v2.10.0"},
      {t:"移动端布局", d:"<768px 全模块自适应 + 底部 Tab。", s:"done", v:"v2.10.1"},
      {t:"Work Board 拖拽改归属", d:"任务卡跨列重新归属 Plan（T121）。", s:"done", v:"v2.10.3"},
      {t:"sites 文档站改造", d:"低文字图表化 + 对齐产品 UI + DDD 逐层浏览，已上线。", s:"done", v:"v2.10.2"},
    ]},
  { cls:"e-orch", ic:"⟁", name:"任务编排", desc:"Center 单一权威下的调度与计划。",
    feats:[
      {t:"Plan DAG 编排", d:"任务依赖图、分发 + 进度。", s:"done", v:"v2.10.0"},
      {t:"Assignment Pool", d:"项目级待认领池 + 工作队列。", s:"done", v:"v2.10.1"},
      {t:"Pool 自由编辑", d:"内置池 task-set 增删，结构化 plan 仍锁定。", s:"done", v:"v2.10.3"},
      {t:"Cycle 节点图编排", d:"控制流引擎 + 合并校验护栏(B0-B3)。", s:"done", v:"v2.13.0"},
      {t:"Task 单一真相源", d:"移除 AgentWorkItem 冗余层，Task 直接驱动(ADR-0049)。", s:"done", v:"v2.14.0"},
    ]},
  { cls:"e-plat", ic:"⚙", name:"平台与可观测", desc:"事件、追踪、密钥等底座能力。",
    feats:[
      {t:"Fleet View / Trace", d:"一屏看 N agent + JSONL trace 归档。", s:"done", v:"v2.8+"},
      {t:"密钥管理", d:"AES-GCM + secret:<name> 引用。", s:"done", v:"v2.9+"},
      {t:"更丰富的观测", d:"跨 agent trace 投影与回放。", s:"vis", v:"vision"},
      {t:"per-agent 用量分析", d:"token/cost 采集 + 活动热力图 + 趋势仪表盘(I28)。", s:"done", v:"v2.15.0"},
    ]},
];
const el = document.getElementById("epics");
el.innerHTML = EPICS.map((e,i)=>{
  const done = e.feats.filter(f=>f.s==="done").length, pct = Math.round(done/e.feats.length*100);
  const feats = e.feats.map(f=>{
    const [lab,cl] = ST[f.s];
    return `<div class="feat"><div class="ft">${f.t}</div><p>${f.d}</p><div class="meta"><span class="st ${cl}"><span class="dot d-${f.s}"></span>${lab}</span><span class="ver">${f.v}</span></div></div>`;
  }).join("");
  return `<section class="epic ${e.cls} fade" style="animation-delay:${i*.06}s">
    <div class="eh"><div class="ic">${e.ic}</div>
      <div class="et"><h3>${e.name}</h3><p>${e.desc}</p></div>
      <div class="prog"><div class="bar"><i style="width:${pct}%"></i></div><div class="pct">${done}/${e.feats.length} 已完成</div></div>
    </div>
    <div class="feats">${feats}</div>
  </section>`;
}).join("");
</script>
</body>
</html>
