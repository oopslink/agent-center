<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-center · DDD 设计</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: #2b2b2b; background: #f4f6fb; line-height: 1.6;
  }
  .hero {
    background: linear-gradient(135deg, #1864ab 0%, #4a1a8c 100%);
    color: #fff; padding: 64px 24px 56px;
  }
  .hero .inner { max-width: 900px; margin: 0 auto; }
  .hero h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: .5px; }
  .hero p { margin: 0; font-size: 16px; opacity: .92; }
  .wrap { max-width: 900px; margin: -28px auto 64px; padding: 0 24px; }
  .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #868e96; margin: 32px 4px 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    background: #fff; border: 1px solid #e3e8f0; border-radius: 14px;
    padding: 22px 22px 20px; box-shadow: 0 4px 18px rgba(24,100,171,.06);
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(24,100,171,.14); border-color: #74c0fc; }
  .card .ver { display: inline-block; font-weight: 700; font-size: 20px; color: #1864ab; }
  .card .badge { float: right; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: #e7f5ff; color: #1864ab; }
  .card .badge.current { background: #ebfbee; color: #1b7d34; }
  .card .desc { margin: 10px 0 14px; font-size: 14px; color: #555; }
  .card .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #f3f0ff; color: #6b3fb0; border: 1px solid #e0d6f7; }
  .foot { max-width: 900px; margin: 0 auto; padding: 0 24px 48px; color: #98a2b3; font-size: 13px; }
  .foot a { color: #1864ab; text-decoration: none; }
</style>
</head>
<body>
  <header class="hero">
    <div class="inner">
      <h1>agent-center · DDD 设计</h1>
      <p>领域驱动设计（战略 / 战术 / Event Storming）的可视化设计稿，按版本归档以便对照演进。</p>
    </div>
  </header>

  <main class="wrap">
    <div class="section-title">设计版本</div>
    <div class="grid">
      <a class="card" href="designs/v2.7/index.html">
        <span class="badge current">当前</span>
        <span class="ver">v2.7</span>
        <div class="desc">领域重构：以 项目管理 / 智能体 / 环境 / 会话 / 可观测性 五个限界上下文重新划分，退役旧的 任务执行域与讨论域。</div>
        <div class="tags">
          <span class="tag">项目管理</span>
          <span class="tag">智能体</span>
          <span class="tag">环境</span>
          <span class="tag">会话</span>
          <span class="tag">可观测性</span>
        </div>
      </a>
    </div>
  </main>

  <footer class="foot">
    绘制规范见仓库 <code>docs/rules/ddd-design-diagram.md</code> ·
    <a href="https://github.com/oopslink/agent-center">GitHub: oopslink/agent-center</a>
  </footer>
</body>
</html>
