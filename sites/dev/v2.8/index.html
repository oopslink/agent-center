<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDD 架构浏览器 · v2.8 · agent-center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/redesign.css">
<style>
.shell { display: grid; grid-template-columns: 248px 1fr; min-height: calc(100vh - 49px); }
/* dark layer rail — product col① callback */
.rail { background: var(--rail-bg); color: var(--rail-ink); padding: 20px 16px; border-right: 1px solid var(--rail-line); position: sticky; top: 49px; align-self: start; height: calc(100vh - 49px); }
.rail h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #64748b; margin-bottom: 14px; }
.layers { list-style: none; padding: 0; margin: 0; }
.layers li { position: relative; padding: 11px 12px 11px 30px; border-radius: 9px; font-size: 13.5px; color: var(--rail-ink); cursor: pointer; transition: .15s; }
.layers li::before { content:""; position: absolute; left: 13px; top: 50%; width: 7px; height: 7px; border-radius: 50%; transform: translateY(-50%); background: var(--rail-line); }
.layers li.done { color: var(--rail-ink-2); } .layers li.done::before { background: var(--essential); }
.layers li.cur { color: #fff; background: rgba(37,99,235,.16); } .layers li.cur::before { background: var(--accent); box-shadow: 0 0 0 4px rgba(37,99,235,.2); }
.layers li.lock { opacity: .4; } .layers li.lock::before { background: var(--rail-line); }
.layers .sub { font-family: var(--font-mono); font-size: 10px; color: #475569; display: block; margin-top: 2px; }
.rail .legend { margin-top: 26px; border-top: 1px solid var(--rail-line); padding-top: 16px; display: grid; gap: 9px; }
.rail .legend div { font-size: 11.5px; display: flex; align-items: center; gap: 8px; color: #94a3b8; }
.rail .legend i { width: 10px; height: 10px; border-radius: 3px; }

.canvas { padding: 26px 34px 60px; position: relative; }
.crumbs { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-3); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.crumbs a { cursor: pointer; } .crumbs b { color: var(--ink); }
.head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin: 6px 0 22px; flex-wrap: wrap; }
.head h1 { font-size: 28px; font-weight: 800; }
.head p { margin: 6px 0 0; color: var(--ink-2); font-size: 14px; max-width: 620px; }
.toggle { display: inline-flex; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 11px; padding: 4px; gap: 2px; }
.toggle button { font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; border: 0; background: transparent; color: var(--ink-2); padding: 7px 14px; border-radius: 8px; cursor: pointer; }
.toggle button.on { background: var(--bg-elevated); color: var(--brand); box-shadow: var(--shadow-1); }

/* ---- context map (L0) ---- */
.map { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.bc { position: relative; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px; cursor: pointer; transition: .2s; overflow: hidden; }
.bc::before { content:""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--c); }
.bc:hover { transform: translateY(-4px); box-shadow: var(--shadow-2); border-color: var(--c); }
.bc .top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
.bc h3 { font-size: 18px; font-weight: 700; }
.bc .zh { font-size: 12px; color: var(--ink-3); font-weight: 500; font-family: var(--font-body); }
.bc p { margin: 0 0 14px; font-size: 13px; color: var(--ink-2); }
.bc .ents { display: flex; flex-wrap: wrap; gap: 5px; }
.bc .ents span { font-family: var(--font-mono); font-size: 10.5px; padding: 2px 7px; border-radius: 6px; background: var(--bg-subtle); color: var(--ink-2); border: 1px solid var(--border); }
.bc .drill { position: absolute; right: 16px; bottom: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--c); font-weight: 700; opacity: 0; transition: .2s; }
.bc:hover .drill { opacity: 1; }
.maphint { text-align:center; color: var(--ink-3); font-family: var(--font-mono); font-size: 12px; margin-top: 20px; }

/* ---- context detail (L1) ---- */
.aggs { display: grid; grid-template-columns: repeat(auto-fill,minmax(230px,1fr)); gap: 14px; }
.agg { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; cursor: pointer; transition: .2s; }
.agg:hover { border-color: var(--accent); box-shadow: var(--shadow-2); transform: translateY(-3px); }
.agg .st { font-family: var(--font-mono); font-size: 10px; color: var(--accent); font-weight: 700; }
.agg h4 { font-size: 16px; margin: 4px 0 6px; }
.agg .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
.agg .open { margin-top: 12px; font-family: var(--font-mono); font-size: 11.5px; font-weight: 700; color: var(--accent); }

/* ---- layered architecture (L1) ---- */
.layered { display: grid; gap: 14px; }
.band { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--bg-elevated); padding: 14px 16px 16px; position: relative; }
.band > .bl { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
.band > .bl .tag { font-size: 9.5px; padding: 2px 7px; border-radius: 999px; font-weight: 600; }
.band.app { background: linear-gradient(0deg,var(--bg-elevated),var(--core-bg) 240%); }
.band.app .bl { color: var(--brand); } .band.app .bl .tag { background: var(--core-bg); color: var(--brand); }
.band.dom .bl { color: var(--essential); } .band.dom .bl .tag { background: var(--essential-bg); color: var(--essential); }
.band.infra { background: var(--bg-subtle); } .band.infra .bl { color: var(--ink-3); } .band.infra .bl .tag { background: var(--border); color: var(--ink-2); }
.svcrow { display: flex; flex-wrap: wrap; gap: 9px; }
.svc { background: var(--bg-elevated); border: 1px dashed var(--border-strong); border-radius: 9px; padding: 9px 12px; min-width: 150px; }
.svc .ster { font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; }
.svc .nm { font-family: var(--font-mono); font-size: 12.5px; font-weight: 700; color: var(--ink); display: block; }
.svc .op { font-family: var(--font-mono); font-size: 10.5px; color: var(--essential); margin-top: 2px; }
.svc.app2 { border-style: solid; border-color: var(--core-bd); } .svc.app2 .nm { color: var(--brand); }
.dom .domwrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }
.dom .aggcol .cl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing:.08em; margin-bottom: 7px; }
.dom .aggcol .aggs { grid-template-columns: 1fr 1fr; }
.repochips { display: flex; flex-wrap: wrap; gap: 7px; }
.repochips span { font-family: var(--font-mono); font-size: 10.5px; padding: 4px 9px; border-radius: 7px; background: var(--bg-elevated); border: 1px solid var(--border-strong); color: var(--ink-2); }
.repochips span::before { content:"⛁ "; color: var(--ink-3); }
.flowarrow { text-align: center; color: var(--ink-3); font-family: var(--font-mono); font-size: 11px; margin: -6px 0; }
/* domain service box in class diagram */
.cls.service { border-style: dashed; border-color: var(--essential); }
.cls.service .ch { background: var(--essential); }

/* ---- entity class diagram (L2) ---- */
.diagram { position: relative; }
#svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.classes { position: relative; z-index: 1; display: flex; flex-wrap: wrap; gap: 46px 60px; padding: 10px; }
.cls { width: 248px; background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: 10px; box-shadow: var(--shadow-2); overflow: hidden; align-self: flex-start; }
.cls .ch { padding: 9px 12px; background: var(--c,#2563eb); color: #fff; }
.cls .ch .ster { font-family: var(--font-mono); font-size: 9.5px; opacity: .82; display:block; }
.cls .ch .nm { font-family: var(--font-mono); font-weight: 700; font-size: 14px; }
.cls .sect { padding: 8px 12px; border-top: 1px solid var(--border); }
.cls .sect:first-of-type { border-top: 0; }
.cls .row { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-2); padding: 1.5px 0; display: flex; justify-content: space-between; gap: 8px; }
.cls .row .ty { color: var(--ink-3); }
.cls .sect.state .row { color: var(--essential); }
.cls .lab { font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
.relkey { display:flex; gap:18px; flex-wrap:wrap; margin: 22px 2px 0; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-3); }
.relkey span b { color: var(--ink); }

/* ---- sequence diagram ---- */
.seq { position: relative; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 22px 10px 28px; overflow-x: auto; }
.seq .lifelines { display: grid; gap: 0; position: relative; min-width: 720px; }
.actorrow { display: grid; grid-template-columns: var(--cols); }
.actor { text-align: center; }
.actor .box { display: inline-block; font-family: var(--font-mono); font-size: 12px; font-weight: 700; background: var(--rail-bg); color: #fff; padding: 8px 12px; border-radius: 8px; }
.actor .box.you { background: var(--brand); } .actor .box.agent { background: var(--essential); }
.lanes { position: relative; min-width: 720px; margin-top: 8px; }
.lane { position: absolute; top: 0; bottom: 0; width: 2px; background: repeating-linear-gradient(var(--border-strong) 0 6px, transparent 6px 12px); transform: translateX(-50%); }
.msg { position: relative; height: 46px; }
.msg .arrow { position: absolute; height: 2px; background: var(--accent); top: 20px; }
.msg .arrow::after { content:""; position: absolute; right: -1px; top: -3px; border: 4px solid transparent; border-left-color: var(--accent); }
.msg .arrow.rtl { background: var(--essential); }
.msg .arrow.rtl::after { right: auto; left: -1px; border-left-color: transparent; border-right-color: var(--essential); }
.msg .arrow.self { width: 26px !important; border-radius: 0 8px 8px 0; height: 22px; background: transparent; border: 2px solid var(--warning); border-left: 0; top: 8px; }
.msg .arrow.self::after { border-left-color: var(--warning); right: -1px; top: 12px; }
.msg .t { position: absolute; top: 2px; font-family: var(--font-mono); font-size: 11px; color: var(--ink); white-space: nowrap; transform: translateX(-50%); background: var(--bg-elevated); padding: 0 6px; }
.msg .t small { color: var(--ink-3); }
.seqnote { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-3); margin: 16px 0 0; text-align:center; }

.backbtn { font-family: var(--font-mono); font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 600; }
.fade { animation: rise .4s ease forwards; }
@keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@media (max-width: 900px){ .shell{grid-template-columns:1fr} .rail{display:none} .map{grid-template-columns:1fr} }
</style>
</head>
<body>
<header class="nav">
  <div class="in"><span class="brand"><span class="glyph"></span>agent-center</span>
    <nav><a href="../../index.html">首页</a><a href="../../product/index.html">产品</a><a class="active" href="#">架构 / DDD</a><a href="../../manual/v2.10.3/index.html">手册</a><a href="https://github.com/oopslink/agent-center">GitHub ↗</a></nav>
  </div>
</header>

<div class="shell">
  <aside class="rail">
    <h4>逐层探索</h4>
    <ul class="layers" id="layers">
      <li data-go="map"><b>① 限界上下文地图</b><span class="sub">7 BC · 战略层</span></li>
      <li data-go="context" class="lock"><b>② 上下文 / 聚合</b><span class="sub" id="l2sub">选一个 BC 进入</span></li>
      <li data-go="class" class="lock"><b>③ 实体类图</b><span class="sub" id="l3sub">选一个聚合进入</span></li>
    </ul>
    <div class="legend">
      <div><i style="background:var(--core)"></i>Core 核心</div>
      <div><i style="background:var(--essential)"></i>Supporting · Essential</div>
      <div><i style="background:var(--peripheral)"></i>Supporting · Peripheral</div>
    </div>
    <div class="legend" style="margin-top:14px">
      <div style="color:#64748b;font-size:10px;letter-spacing:.1em">视图</div>
      <div><i style="background:var(--accent)"></i>结构 drill-down</div>
      <div><i style="background:var(--warning)"></i>序列图 sequence</div>
    </div>
  </aside>

  <main class="canvas">
    <div class="crumbs" id="crumbs"></div>
    <div class="head">
      <div><h1 id="title"></h1><p id="sub"></p></div>
      <div class="toggle"><button id="mStruct" class="on" onclick="setMode('structure')">结构</button><button id="mSeq" onclick="setMode('sequence')">序列图</button></div>
    </div>
    <div id="body"></div>
  </main>
</div>

<script>
/* ---------- real domain data (v2.8 · 以 internal/* 校准) ---------- */
const BCS = {
  projectmanager:{ name:"ProjectManager", zh:"项目管理 (核心域)", cls:"core", clsLabel:"Core", c:"var(--core)",
    desc:"订阅真相 + OrgSequence (T<n>/I<n>)。Project / Issue / Task / ProjectMember 四聚合；Task 八态生命周期含验收。",
    aggs:["task","issue","project","projectmember"],
    app:["TaskService · 任务生命周期","IssueService · open→conclude","ProjectService · 项目/成员"],
    dom:[{n:"OrgSequenceService",o:"allocate()→T<n>/I<n>"},{n:"SubscriptionService",o:"subscribe() / unsubscribe()"}],
    repo:["TaskRepository","IssueRepository","ProjectRepository","ProjectMemberRepository","TaskSubscriberRepository","IssueSubscriberRepository","OrgSequenceRepository"] },
  agent:       { name:"Agent", zh:"智能体 (核心域)", cls:"core", clsLabel:"Core", c:"var(--core)",
    desc:"在 worker 上执行任务的智能体；生命周期与工作项是两个独立聚合，强制单活工作项 (HasActiveWorkItem)。",
    aggs:["agent","agentworkitem","activityevent"],
    app:["AgentService · 注册/profile","WorkItemService · 调度与转移"],
    dom:[{n:"WorkItemDispatchService",o:"activate() / supersede()"},{n:"AvailabilityService",o:"derive(lifecycle)→availability"}],
    repo:["AgentRepository","AgentWorkItemRepository","AgentActivityEventRepository"] },
  environment: { name:"Environment", zh:"环境 (核心域)", cls:"core", clsLabel:"Core", c:"var(--core)",
    desc:"environment + workforce + files + blobstore 四包文档合并：控制信道 + Worker/AgentInstance + 文件传输 + 内容寻址对象存储。",
    aggs:["worker","agentinstance","filetransfer"],
    app:["WorkerControlService · 心跳/offset ack","EnrollService · BootstrapToken","FileTransferService · upload/download"],
    dom:[{n:"WorkerLifecycleService",o:"online() / offline() 级联"},{n:"BlobGCService",o:"refcount=0 + 宽限 → GC"}],
    repo:["WorkerRepository","AgentInstanceRepository","BootstrapTokenRepository","FileTransferSessionRepository","BlobStore"] },
  conversation:{ name:"Conversation", zh:"会话 (核心域)", cls:"core", clsLabel:"Core", c:"var(--core)",
    desc:"统一线程外壳 (surface-agnostic)：kind = dm / channel / task / issue 各 1:1 绑定；Message 追加写 + InputRequest 引用。",
    aggs:["conversation"],
    app:["SendMessageService · 写入会话","InputRequestService · 停泊/响应"],
    dom:[{n:"ConversationLifecycleService",o:"open() / close() / archive()"}],
    repo:["ConversationRepository","MessageRepository"] },
  observability:{ name:"Observability", zh:"可观测性 (支撑域 · 只读)", cls:"essential", clsLabel:"Supporting · Essential", c:"var(--essential)",
    desc:"Event 追加写 + 投影读模型；纯下游消费者 (OHS)。状态变更与事件追加共用同一事务 (reason→message 成对)。",
    aggs:["event"],
    app:["ProjectionService · 投影读模型","TraceQueryService · Activity 翻页"],
    dom:[{n:"EventProjectionService",o:"project(event)→读模型"}],
    repo:["EventRepository","ProjectionRepository"] },
  identity:    { name:"Identity", zh:"身份 (支撑域 · 真实 BC + SK)", cls:"essential", clsLabel:"Supporting · Essential", c:"var(--essential)",
    desc:"Identity / Organization / Member / Invitation 四聚合；另供 IdentityRef 共享内核词汇 (SK) 横切全域。",
    aggs:["identity","member"],
    app:["IdentityService · 身份/组织","MembershipService · 成员/邀请"],
    dom:[{n:"InvitationService",o:"invite() / accept()"}],
    repo:["IdentityRepository","OrganizationRepository","MemberRepository","InvitationRepository"] },
  secret:      { name:"SecretManagement", zh:"密钥管理 (支撑域)", cls:"peripheral", clsLabel:"Supporting · Peripheral", c:"var(--peripheral)",
    desc:"每用户 API key (migration 0012) · master-key AES-256 加密 · 明文永不回显。",
    aggs:["usersecret"],
    app:["UserSecretService · CRUD / 撤销"],
    dom:[{n:"SecretCryptoService",o:"encrypt() / decrypt(master-key)"}],
    repo:["UserSecretRepository"] },
};
/* aggregate clusters → entity class boxes */
const AGGS = {
  task: { bc:"projectmanager", root:"Task", title:"Task 聚合", meta:"TaskStatus 8 态 · 含验收",
    classes:[
      { id:"Task", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["projectID","FK"],["title","string"],["assignee","IdentityRef"],["derivedFromIssue","FK?"],["orgNumber","T<n>"]], state:["created","assigned","running","blocked","completed","verified","canceled"], ops:["assign()","block()","complete()","verify()"] },
      { id:"TaskSubscriber", ster:"«Entity»", c:"var(--accent)", fields:[["task_id","FK"],["identity","IdentityRef"]], state:[], ops:[] },
      { id:"AgentWorkItem", ster:"«AR · Agent BC»", c:"var(--core)", fields:[["taskRef","pm://tasks/{id}"]], state:["queued","active","…"], ops:[] },
      { id:"Conversation", ster:"«AR · Conversation BC»", c:"var(--essential)", fields:[["kind","'task'"]], state:[], ops:[] },
    ],
    rels:[ ["Task","TaskSubscriber","1","N","订阅真相"], ["Task","AgentWorkItem","1","N","派发→执行"], ["Task","Conversation","1","1","任务讨论线程"] ],
    svc:{ n:"OrgSequenceService", ops:["allocate()→T<n>"], uses:"Task" } },
  issue: { bc:"projectmanager", root:"Issue", title:"Issue 聚合", meta:"IssueStatus 6 态 · 协商",
    classes:[
      { id:"Issue", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["projectID","FK"],["title","string"],["orgNumber","I<n>"]], state:["open","under_discussion","resolved","concluded","withdrawn","closed"], ops:["open()","conclude()→Task","withdraw()"] },
      { id:"IssueSubscriber", ster:"«Entity»", c:"var(--accent)", fields:[["issue_id","FK"],["identity","IdentityRef"]], state:[], ops:[] },
      { id:"Conversation", ster:"«AR · Conversation BC»", c:"var(--essential)", fields:[["kind","'issue'"]], state:[], ops:[] },
    ],
    rels:[ ["Issue","IssueSubscriber","1","N","订阅真相"], ["Issue","Conversation","1","1","议题讨论线程"] ],
    svc:{ n:"OrgSequenceService", ops:["allocate()→I<n>"], uses:"Issue" } },
  project: { bc:"projectmanager", root:"Project", title:"Project 聚合", meta:"组织作用域容器",
    classes:[
      { id:"Project", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","proj-…"],["name","string"],["tags","[]string"],["organizationID","FK"]], state:[], ops:["create()","rename()"] },
      { id:"CodeRepoRef", ster:"«AR»", c:"var(--accent)", fields:[["repo_url","string"],["project_id","FK"]], state:[], ops:[] },
    ],
    rels:[ ["Project","CodeRepoRef","1","N","代码库引用"] ] },
  projectmember: { bc:"projectmanager", root:"ProjectMember", title:"ProjectMember 聚合", meta:"角色绑定",
    classes:[
      { id:"ProjectMember", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","MemberID"],["projectID","FK"],["identityID","FK"],["role","enum"],["addedBy","IdentityRef"]], state:[], ops:["add()","setRole()"] },
    ],
    rels:[] },
  agent: { bc:"agent", root:"Agent", title:"Agent 聚合", meta:"lifecycle 状态机 · ADR profile VO",
    classes:[
      { id:"Agent", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["organizationID","FK"],["profile","Profile VO"],["skills","[]string"],["workerID","不可变"],["lifecycle","enum"]], state:["stopped","running","stopping","resetting","error","failed"], ops:["start()","stop()","reset()","archive()"] },
      { id:"Profile", ster:"«Value Object»", c:"var(--peripheral)", fields:[["Name","string"],["Model","string"],["CLI","string"],["EnvVars","map"]], state:[], ops:[] },
    ],
    rels:[ ["Agent","Profile","1","1","内嵌 (无顶层 name)"] ],
    svc:{ n:"AvailabilityService", ops:["derive(lifecycle)→availability"], uses:"Agent" } },
  agentworkitem: { bc:"agent", root:"AgentWorkItem", title:"AgentWorkItem 聚合", meta:"WorkItemStatus 7 态 · 单活不变式",
    classes:[
      { id:"AgentWorkItem", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["agentID","FK"],["taskRef","pm://tasks/{id} (非拥有)"]], state:["queued","active","waiting_input","done","failed","canceled","superseded"], ops:["activate()","supersede()"] },
      { id:"Agent", ster:"«AR · 单活闸»", c:"var(--core)", fields:[["lifecycle","enum"]], state:[], ops:[] },
    ],
    rels:[ ["Agent","AgentWorkItem","1","N","单智能体仅 1 活跃"] ],
    svc:{ n:"WorkItemDispatchService", ops:["activate()","supersede(old)"], uses:"AgentWorkItem" } },
  activityevent: { bc:"agent", root:"AgentActivityEvent", title:"AgentActivityEvent 聚合", meta:"追加写 · 观测流",
    classes:[
      { id:"AgentActivityEvent", ster:"«Aggregate Root · append-only»", c:"var(--core)", fields:[["id","ULID"],["agentID","FK"],["kind","tool_use|tool_result|…"]], state:[], ops:["append()"] },
    ],
    rels:[] },
  worker: { bc:"environment", root:"Worker", title:"Worker 聚合", meta:"丰富 AR (workforce) + 瘦控制信道 AR",
    classes:[
      { id:"Worker", ster:"«AR · workforce 丰富»", c:"var(--core)", fields:[["id","ULID"],["name","string"],["capabilities","[]Capability"],["concurrency","int"],["lastHeartbeatAt","ts"]], state:["online","offline","enrolling"], ops:["enroll()","heartbeat()"] },
      { id:"WorkerControl", ster:"«AR · environment 瘦»", c:"var(--accent)", fields:[["lastAckedOffset","int"],["status","offline⇄online"]], state:["offline","online"], ops:["ack(offset)"] },
    ],
    rels:[ ["Worker","WorkerControl","1","1","控制信道 offset ack"] ],
    svc:{ n:"WorkerLifecycleService", ops:["online() / offline() 级联 agent"], uses:"Worker" } },
  agentinstance: { bc:"environment", root:"AgentInstance", title:"AgentInstance 聚合", meta:"workforce + BootstrapToken",
    classes:[
      { id:"AgentInstance", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["worker_id","FK"]], state:[], ops:["bind()"] },
      { id:"BootstrapToken", ster:"«AR · 入网引导»", c:"var(--accent)", fields:[["token","one-time"],["fingerprint","sha256:…"]], state:["pending","consumed","revoked"], ops:["mint()","consume()"] },
    ],
    rels:[ ["AgentInstance","BootstrapToken","1","N","接入凭据"] ] },
  filetransfer: { bc:"environment", root:"FileTransferSession", title:"FileTransferSession 聚合", meta:"files + blobstore · 内容寻址",
    classes:[
      { id:"FileTransferSession", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["fileURI","FileURI"],["transferURI","ac://transfers/{id}"],["direction","TransferDirection"],["sha256","string"],["scope","FileScope"]], state:["open","completed","failed"], ops:["open()","complete()"] },
      { id:"BlobStore", ster:"«通用基础设施 · blobstore»", c:"var(--peripheral)", fields:[["addressing","sha256 内容寻址"],["ref_count","int"]], state:[], ops:["put()","gc()"] },
    ],
    rels:[ ["FileTransferSession","BlobStore","N","1","内容寻址引用"] ],
    svc:{ n:"BlobGCService", ops:["ref_count=0 + 宽限 → 回收"], uses:"BlobStore" } },
  conversation: { bc:"conversation", root:"Conversation", title:"Conversation 聚合", meta:"统一线程 · 4 surface",
    classes:[
      { id:"Conversation", ster:"«Aggregate Root»", c:"var(--core)", fields:[["id","ULID"],["kind","dm|channel|task|issue"],["ownerRef","OwnerRef"],["projectRef","FK?"],["participants","[]Participant"]], state:["active","closed","archived"], ops:["open()","close()","archive()"] },
      { id:"Message", ster:"«Entity · append-only»", c:"var(--core)", fields:[["id","ULID"],["senderIdentityID","IdentityRef"],["contentKind","enum"],["inputRequestRef","FK?"],["attachments","[]"]], state:[], ops:[] },
      { id:"Identity", ster:"«VO · SK»", c:"var(--essential)", fields:[["ref","user:|agent:"]], state:[], ops:[] },
    ],
    rels:[ ["Conversation","Message","1","N","append-only"], ["Message","Identity","N","1","sender"] ] },
  event: { bc:"observability", root:"Event", title:"Event 聚合", meta:"append-only · 同事务",
    classes:[
      { id:"Event", ster:"«Aggregate Root»", c:"var(--essential)", fields:[["ID","EventID"],["OccurredAt","ts"],["Seq","int"],["EventType","string"],["Refs","EventRefs"],["Actor","IdentityRef"],["Payload","map"]], state:[], ops:["append()"] },
      { id:"Projection", ster:"«读模型»", c:"var(--accent)", fields:[["source","Event"],["view","table"]], state:[], ops:["project()"] },
    ],
    rels:[ ["Event","Projection","1","N","投影读模型"] ],
    svc:{ n:"EventProjectionService", ops:["project(event)→读模型"], uses:"Event" } },
  identity: { bc:"identity", root:"Identity", title:"Identity / Organization 聚合", meta:"多租户 SK 之源",
    classes:[
      { id:"Identity", ster:"«Aggregate Root»", c:"var(--essential)", fields:[["id","ULID"],["kind","user|agent"]], state:[], ops:[] },
      { id:"Organization", ster:"«Aggregate Root»", c:"var(--essential)", fields:[["id","ULID"],["name","string"]], state:[], ops:[] },
      { id:"IdentityRef", ster:"«VO · 共享内核»", c:"var(--peripheral)", fields:[["ref","user:|agent:|T<n>"]], state:[], ops:[] },
    ],
    rels:[ ["Organization","Identity","1","N","多租户归属"], ["Identity","IdentityRef","1","N","共享内核词汇"] ] },
  member: { bc:"identity", root:"Member", title:"Member / Invitation 聚合", meta:"组织成员 + 邀请",
    classes:[
      { id:"Member", ster:"«Aggregate Root»", c:"var(--essential)", fields:[["id","ULID"],["organizationID","FK"],["identityID","FK"],["role","enum"]], state:["active","removed"], ops:["add()","remove()"] },
      { id:"Invitation", ster:"«Aggregate Root»", c:"var(--essential)", fields:[["id","ULID"],["organizationID","FK"],["token","one-time"]], state:["pending","accepted","revoked","expired"], ops:["invite()","accept()"] },
    ],
    rels:[ ["Invitation","Member","1","1","accept→成员"] ] },
  usersecret: { bc:"secret", root:"UserSecret", title:"UserSecret 聚合", meta:"AES-256 · migration 0012",
    classes:[
      { id:"UserSecret", ster:"«Aggregate Root»", c:"var(--peripheral)", fields:[["id","ULID"],["userID","FK"],["name","unique"],["value","AES-256(master-key)"]], state:["active","revoked"], ops:["create()","revoke()"] },
    ],
    rels:[],
    svc:{ n:"SecretCryptoService", ops:["encrypt() / decrypt(master-key)"], uses:"UserSecret" } },
};

let S = { view:"map", bc:null, agg:null, mode:"structure" };
const $ = s => document.querySelector(s);

function setMode(m){ S.mode = m; $("#mStruct").classList.toggle("on", m==="structure"); $("#mSeq").classList.toggle("on", m==="sequence"); render(); }
function go(view, bc, agg){ S.view=view; if(bc!==undefined)S.bc=bc; if(agg!==undefined)S.agg=agg; render(); }

function render(){
  if(S.mode==="sequence"){ renderSeq(); updateRail(); return; }
  if(S.view==="map") renderMap();
  else if(S.view==="context") renderContext();
  else renderClass();
  updateRail();
}
function updateRail(){
  const items = document.querySelectorAll("#layers li");
  const order = {map:0, context:1, class:2};
  const cur = S.mode==="sequence" ? -1 : order[S.view];
  items.forEach((li,i)=>{ li.className=""; if(i<cur)li.classList.add("done"); else if(i===cur)li.classList.add("cur"); else li.classList.add("lock"); li.onclick=()=>{ if(i===0)go("map"); else if(i===1&&S.bc)go("context"); else if(i===2&&S.agg)go("class"); }; });
  $("#l2sub").textContent = S.bc ? BCS[S.bc].name : "选一个 BC 进入";
  $("#l3sub").textContent = S.agg ? AGGS[S.agg].root : "选一个聚合进入";
}

function renderMap(){
  $("#title").textContent="DDD 架构浏览器 · v2.8";
  $("#sub").textContent="从 7 个限界上下文开始，逐层点开到聚合与实体类图。绿点=已访问，蓝点=当前。";
  $("#crumbs").innerHTML="<b>① 限界上下文地图</b>";
  let h='<div class="map fade">';
  for(const k in BCS){ const b=BCS[k];
    h+=`<div class="bc" style="--c:${b.c}" onclick="go('context','${k}')">
      <div class="top"><div><h3>${b.name}</h3><div class="zh">${b.zh}</div></div><span class="chip ${b.cls}">${b.clsLabel}</span></div>
      <p>${b.desc}</p>
      <div class="ents">${b.aggs.map(a=>`<span>${AGGS[a].root}</span>`).join("")}</div>
      <span class="drill">进入 →</span></div>`; }
  h+='</div><div class="maphint">点任意上下文卡片 → 进入其聚合 ②</div>';
  $("#body").innerHTML=h;
}
function renderContext(){
  const b=BCS[S.bc];
  $("#title").innerHTML=`${b.name} <span style="font-size:15px;color:var(--ink-3);font-weight:500">${b.zh}</span>`;
  $("#sub").textContent=b.desc+" 分层：应用层编排用例 → 领域层(聚合 + 领域服务) → 基础设施层仓储。";
  $("#crumbs").innerHTML=`<a onclick="go('map')">① 地图</a> › <b>② ${b.name} · 分层</b>`;
  const app = b.app.map(s=>`<div class="svc app2"><span class="ster">«Application Service»</span><span class="nm">${s}</span></div>`).join("");
  const dom = b.dom.map(s=>`<div class="svc"><span class="ster">«Domain Service»</span><span class="nm">${s.n}</span><div class="op">+ ${s.o}</div></div>`).join("");
  const aggs = b.aggs.map(a=>{ const g=AGGS[a];
    return `<div class="agg" onclick="go('class',undefined,'${a}')"><div class="st">«Aggregate Root»</div><h4>${g.root}</h4><div class="meta">${g.classes.length} 实体 · ${g.meta}</div><div class="open">展开类图 →</div></div>`; }).join("");
  const repo = b.repo.map(r=>`<span>${r}</span>`).join("");
  $("#body").innerHTML=`
   <div style="margin-bottom:14px"><span class="chip ${b.cls}">${b.clsLabel}</span></div>
   <div class="layered fade">
     <div class="band app"><div class="bl"><span class="tag">应用层</span>Application Services · 用例编排 / 事务边界</div><div class="svcrow">${app}</div></div>
     <div class="flowarrow">↓ 调用</div>
     <div class="band dom"><div class="bl"><span class="tag">领域层</span>Domain · 聚合 + 领域服务（业务规则的家）</div>
       <div class="domwrap">
         <div class="aggcol"><div class="cl">聚合根 / 实体 — 点开看类图</div><div class="aggs">${aggs}</div></div>
         <div class="svccol"><div class="cl" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px">领域服务 — 跨聚合的无状态规则</div><div class="svcrow" style="flex-direction:column">${dom}</div></div>
       </div>
     </div>
     <div class="flowarrow">↓ 依赖倒置（端口）</div>
     <div class="band infra"><div class="bl"><span class="tag">基础设施层</span>Repositories · 持久化端口</div><div class="repochips">${repo}</div></div>
   </div>`;
}
function renderClass(){
  const g=AGGS[S.agg]; const b=BCS[g.bc];
  $("#title").textContent=g.title;
  $("#sub").textContent=`${b.name} BC · ${g.meta}。方框=实体/VO，连线=关系与重数。`;
  $("#crumbs").innerHTML=`<a onclick="go('map')">① 地图</a> › <a onclick="go('context','${g.bc}')">② ${b.name}</a> › <b>③ ${g.root} 类图</b>`;
  let boxes='';
  g.classes.forEach(c=>{
    const fields=c.fields.map(f=>`<div class="row"><span>${f[0]}</span><span class="ty">${f[1]}</span></div>`).join("");
    const state=c.state.length?`<div class="sect state"><div class="lab">state machine</div>${c.state.map(s=>`<div class="row">● ${s}</div>`).join("")}</div>`:"";
    const ops=c.ops.length?`<div class="sect"><div class="lab">behavior</div>${c.ops.map(o=>`<div class="row">+ ${o}</div>`).join("")}</div>`:"";
    boxes+=`<div class="cls" id="cls-${c.id}" style="--c:${c.c}"><div class="ch"><span class="ster">${c.ster}</span><span class="nm">${c.id}</span></div><div class="sect">${fields}</div>${state}${ops}</div>`;
  });
  let rels = g.rels.slice();
  if(g.svc){
    boxes+=`<div class="cls service" id="cls-${g.svc.n}" style="--c:var(--essential)"><div class="ch"><span class="ster">«Domain Service»</span><span class="nm">${g.svc.n}</span></div><div class="sect"><div class="lab">behavior</div>${g.svc.ops.map(o=>`<div class="row">+ ${o}</div>`).join("")}</div></div>`;
    rels.push([g.svc.n, g.svc.uses, "", "", "uses"]);
  }
  const key=`<div class="relkey"><span><b>──</b> 关联</span><span><b>1 — N</b> 一对多</span><span style="color:var(--essential)"><b>┄ «uses»</b> 领域服务操作聚合</span><span>虚线=跨 BC</span></div>`;
  $("#body").innerHTML=`<div class="diagram"><svg id="svg"></svg><div class="classes fade">${boxes}</div></div>${key}<p class="seqnote">应用层用例 → 调 领域服务 + 聚合（见上一层「分层」视图）· 切「序列图」看运行时协作 ↗</p>`;
  requestAnimationFrame(()=>drawRels(rels));
}
function drawRels(rels){
  const svg=$("#svg"), wrap=svg.parentElement, wb=wrap.getBoundingClientRect();
  svg.setAttribute("viewBox",`0 0 ${wb.width} ${wb.height}`);
  let p="";
  rels.forEach(r=>{
    const a=document.getElementById("cls-"+r[0]), b=document.getElementById("cls-"+r[1]); if(!a||!b)return;
    const ar=a.getBoundingClientRect(), br=b.getBoundingClientRect();
    const ax=ar.left-wb.left+ar.width/2, ay=ar.bottom-wb.top, bx=br.left-wb.left+br.width/2, by=br.top-wb.top;
    const uses = r[4]==="uses";
    const cross = r[1]==="Conversation" || r[2]==="0";
    const my=(ay+by)/2;
    const col = (uses||cross)? "var(--essential)" : "var(--accent)";
    p+=`<path d="M ${ax} ${ay} C ${ax} ${my}, ${bx} ${my}, ${bx} ${by}" fill="none" stroke="${col}" stroke-width="2" ${(cross||uses)?'stroke-dasharray="6 5"':''}/>`;
    p+=`<circle cx="${ax}" cy="${ay}" r="3.5" fill="${col}"/>`;
    if(uses){ const mx=(ax+bx)/2; p+=`<rect x="${mx-26}" y="${my-9}" width="52" height="17" rx="5" fill="#fff" stroke="${col}"/><text x="${mx}" y="${my+3}" font-size="10" font-family="JetBrains Mono" text-anchor="middle" fill="${col}">«uses»</text>`; }
    else {
      p+=`<rect x="${ax-9}" y="${ay+4}" width="18" height="15" rx="4" fill="#fff" stroke="${col}"/><text x="${ax}" y="${ay+15}" font-size="10" font-family="JetBrains Mono" text-anchor="middle" fill="${col}">${r[2]}</text>`;
      p+=`<rect x="${bx-9}" y="${by-19}" width="18" height="15" rx="4" fill="#fff" stroke="${col}"/><text x="${bx}" y="${by-8}" font-size="10" font-family="JetBrains Mono" text-anchor="middle" fill="${col}">${r[3]}</text>`;
    }
  });
  svg.innerHTML=p;
}
window.addEventListener("resize",()=>{ if(S.view==="class"&&S.mode==="structure"){ const g=AGGS[S.agg]; requestAnimationFrame(()=>drawRels(g.rels)); } });

/* ---------- sequence diagram ---------- */
const ACTORS=[ {k:"you",n:"You · 用户"},{k:"",n:"Center"},{k:"",n:"Worker"},{k:"agent",n:"Agent · WorkItem"} ];
const MSGS=[
  {f:0,t:1,l:"create_task",s:"建任务"},
  {f:1,t:1,self:true,l:"assign_task → WorkItem(queued)",s:"派发"},
  {f:1,t:2,l:"控制信道下推 (SSE/poll)",s:"派单"},
  {f:2,t:3,l:"activate_work_item (queued→active)",s:"working"},
  {f:3,t:1,l:"post_task_message",s:"会话消息"},
  {f:3,t:1,rtl:true,l:"request_input (waiting_input)",s:"卡住请示"},
  {f:1,t:0,rtl:true,l:"InputRequest → 收件箱",s:"升级到人"},
  {f:0,t:1,l:"response",s:"采纳答案"},
  {f:3,t:1,rtl:true,l:"AgentActivityEvent (观测流)",s:"实时投影"},
  {f:3,t:1,rtl:true,l:"complete_task (running→completed)",s:"待验收"},
  {f:0,t:1,l:"verify_task (completed→verified)",s:"验收(≠完成者)"},
];
function renderSeq(){
  $("#title").textContent="派单 · 执行 · 验收 · 序列图 · v2.8";
  $("#sub").textContent="一次「建任务 → 派发 → 执行 → 请示 → 完成 → 验收」的端到端协作，跨 ProjectManager / Agent / Conversation / Environment。";
  $("#crumbs").innerHTML="<b>序列图 · dispatch & verify</b>";
  const N=ACTORS.length, cols=`repeat(${N},1fr)`;
  const pct=i=>((i+0.5)/N*100);
  let actors=`<div class="actorrow" style="--cols:${cols}">`+ACTORS.map(a=>`<div class="actor"><span class="box ${a.k}">${a.n}</span></div>`).join("")+`</div>`;
  let lanes=`<div class="lanes" style="height:${MSGS.length*46+10}px">`;
  for(let i=0;i<N;i++) lanes+=`<div class="lane" style="left:${pct(i)}%"></div>`;
  MSGS.forEach((m,i)=>{
    const x1=pct(m.f), x2=pct(m.t), top=i*46;
    if(m.self){ lanes+=`<div class="msg" style="top:${top}px"><div class="arrow self" style="left:${x1}%"></div><div class="t" style="left:${x1+6}%;transform:none">${m.l} <small>${m.s}</small></div></div>`; }
    else { const L=Math.min(x1,x2), W=Math.abs(x2-x1); const mid=(x1+x2)/2;
      lanes+=`<div class="msg" style="top:${top}px"><div class="arrow ${m.rtl?'rtl':''}" style="left:${L}%;width:${W}%"></div><div class="t" style="left:${mid}%">${m.l} <small>${m.s}</small></div></div>`; }
  });
  lanes+=`</div>`;
  $("#body").innerHTML=`<div class="seq fade">${actors}${lanes}</div><p class="seqnote">蓝色→ 下行命令 · 绿色← 上行回报/事件 · 橙框↻ 自调用 · 竖虚线=实体生命线</p>`;
}

render();
</script>
